<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Malaysia Photo Album ྀི</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --soft-pink: #fdf2f2;
            --ribbon-pink: #f8c8dc;
            --deep-rose: #d4a5a9;
            --lace-white: #fffbfc;
            --text-brown: #5d4945;
        }

        body {
            background-color: var(--soft-pink);
            color: var(--text-brown);
            font-family: 'Playfair Display', serif;
            margin: 0;
            padding: 40px 20px;
            /* Subtle lace/polka dot background pattern */
            background-image: radial-gradient(var(--ribbon-pink) 0.8px, transparent 0.8px);
            background-size: 24px 24px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            border-bottom: 1px double var(--deep-rose);
            display: inline-block;
            width: 100%;
            padding-bottom: 20px;
        }

        h1 {
            font-family: 'Pinyon Script', cursive;
            font-size: 5.5rem;
            color: var(--deep-rose);
            margin: 0;
            font-weight: normal;
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.8rem;
            margin-top: -10px;
            opacity: 0.7;
        }

        /* 3x3 GRID LAYOUT */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .grid-item {
            background: var(--lace-white);
            border: 1px solid var(--deep-rose);
            padding: 15px;
            border-radius: 2px; /* Polaroid style */
            box-shadow: 0 10px 25px rgba(212, 165, 169, 0.2);
            position: relative;
            transition: all 0.3s ease-in-out;
            text-align: center;
        }

        /* The 🎀 Ribbon Decoration on every photo */
        .grid-item::before {
            content: '🎀';
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            z-index: 5;
        }

        .grid-item:hover {
            transform: translateY(-8px) rotate(1deg);
            box-shadow: 0 15px 30px rgba(212, 165, 169, 0.4);
        }

        .image-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #fcfcfc;
            border: 1px solid #f0efef;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
